<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 视觉资产库 Vol.2：光学与物理篇</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--surface:rgba(18,18,22,.88);--surface2:rgba(30,30,38,.6);
  --border:rgba(255,255,255,.06);--text:#f0f0f5;--text2:rgba(255,255,255,.45);
  --text3:rgba(255,255,255,.28);--accent:#00d4ff;--accent2:#7c5cfc;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 70% 10%,rgba(0,212,255,.05),transparent),
  radial-gradient(ellipse 60% 50% at 20% 80%,rgba(124,92,252,.04),transparent)}
body::after{content:'';position:fixed;inset:0;z-index:0;opacity:.3;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:60px 60px}

#app{display:flex;height:100vh;position:relative;z-index:1}

/* 左侧边栏 */
#sidebar{width:280px;min-width:280px;background:var(--surface);backdrop-filter:blur(24px);
  border-right:1px solid var(--border);display:flex;flex-direction:column;position:relative}
#sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(180deg,transparent,rgba(0,212,255,.2) 30%,rgba(124,92,252,.2) 70%,transparent);pointer-events:none}
#sidebar-header{padding:24px 20px 18px;border-bottom:1px solid var(--border);position:relative}
#sidebar-header::before{content:'';position:absolute;bottom:0;left:20px;right:20px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,.3),rgba(124,92,252,.3),transparent)}
#sidebar-header h1{font-size:14px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
#sidebar-header h1::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--accent2);
  box-shadow:0 0 10px var(--accent2);animation:pulse 2s ease-in-out infinite}
#sidebar-header p{font-size:10px;color:var(--text3);margin-top:5px;letter-spacing:1.5px;text-transform:uppercase;padding-left:15px}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

#nav-list{list-style:none;flex:1;overflow-y:auto;padding:8px 6px}
#nav-list::-webkit-scrollbar{width:3px}
#nav-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.nav-item{padding:12px 14px;border-radius:10px;cursor:pointer;margin-bottom:3px;
  transition:all .25s cubic-bezier(.4,0,.2,1);border:1px solid transparent;position:relative;overflow:hidden}
.nav-item::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:0;
  border-radius:0 3px 3px 0;background:linear-gradient(180deg,var(--accent),var(--accent2));transition:height .25s}
.nav-item:hover{background:var(--surface2);border-color:rgba(255,255,255,.04)}
.nav-item:hover::before{height:20px}
.nav-item.active{background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(124,92,252,.08));
  border-color:rgba(0,212,255,.15);box-shadow:0 0 20px rgba(0,212,255,.05)}
.nav-item.active::before{height:28px}
.nav-item .en{font-size:12px;font-weight:600;color:rgba(255,255,255,.8);transition:color .25s}
.nav-item .zh{font-size:10px;color:var(--text3);margin-top:2px}
.nav-item.active .en{color:var(--accent);text-shadow:0 0 16px rgba(0,212,255,.3)}
.nav-item.active .zh{color:var(--text2)}

/* 中间详情区 */
#detail{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;
  background:linear-gradient(180deg,rgba(9,9,11,.95),rgba(12,12,16,.98))}

/* 信息面板 */
#info-panel{padding:24px 28px;border-bottom:1px solid var(--border);overflow-y:auto;max-height:38%;position:relative}
#info-panel::after{content:'';position:absolute;bottom:0;left:28px;right:28px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,.15),rgba(124,92,252,.15),transparent)}
#info-panel::-webkit-scrollbar{width:3px}
#info-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:3px}
#info-title{font-size:28px;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--accent),var(--accent2),#e879f9);background-size:200% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:grad 4s ease infinite}
@keyframes grad{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
#info-subtitle{font-size:11px;color:var(--text2);margin-top:4px;letter-spacing:.6px;font-weight:500}
#info-desc{margin-top:14px;font-size:13px;line-height:1.8;color:rgba(255,255,255,.65)}
.info-section{margin-top:14px}
.info-section h3{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);
  margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:6px}
.info-section h3::before{content:'';width:12px;height:1px;background:linear-gradient(90deg,var(--accent),transparent)}
.tag-list{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:4px 10px;border-radius:7px;font-size:10px;font-family:'JetBrains Mono',monospace;
  font-weight:500;backdrop-filter:blur(8px);transition:all .2s}
.tag.param{background:rgba(0,212,255,.08);color:var(--accent);border:1px solid rgba(0,212,255,.12)}
.tag.tech{background:rgba(124,92,252,.08);color:var(--accent2);border:1px solid rgba(124,92,252,.12)}

/* Prompt 面板 */
#prompt-panel{width:320px;min-width:320px;background:var(--surface);backdrop-filter:blur(24px);
  border-left:1px solid var(--border);display:flex;flex-direction:column;position:relative}
#prompt-panel::before{content:'';position:absolute;top:0;left:0;width:1px;height:100%;
  background:linear-gradient(180deg,transparent,rgba(124,92,252,.2) 30%,rgba(0,212,255,.2) 70%,transparent);pointer-events:none}
#prompt-header{padding:20px 16px 14px;border-bottom:1px solid var(--border);position:relative;flex-shrink:0}
#prompt-header::before{content:'';position:absolute;bottom:0;left:16px;right:16px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(124,92,252,.3),rgba(0,212,255,.3),transparent)}
#prompt-header h2{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);
  display:flex;align-items:center;gap:8px}
#prompt-header h2::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 8px var(--accent);animation:pulse 2.5s ease-in-out infinite}
#prompt-cards{flex:1;overflow-y:auto;padding:12px}
#prompt-cards::-webkit-scrollbar{width:3px}
#prompt-cards::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

.prompt-card{margin-bottom:10px;padding:14px;background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:11px;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s}
.prompt-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cg,rgba(255,255,255,.08)),transparent);opacity:.6}
.prompt-card:hover{border-color:var(--cb,rgba(255,255,255,.1));box-shadow:0 4px 20px var(--cs,rgba(0,0,0,.2))}
.prompt-card .p-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.prompt-card .p-label{font-family:'Inter',sans-serif;font-weight:600;font-size:10px;letter-spacing:.5px}
.prompt-card .p-text{color:rgba(255,255,255,.4);font-size:11px;line-height:1.7;font-family:'JetBrains Mono',monospace;word-break:break-all}
#p-mj{--cg:rgba(0,212,255,.2);--cb:rgba(0,212,255,.18);--cs:rgba(0,212,255,.04)}
#p-mj .p-label{color:var(--accent)}
#p-trae{--cg:rgba(52,211,153,.2);--cb:rgba(52,211,153,.18);--cs:rgba(52,211,153,.04);border-color:rgba(52,211,153,.06)}
#p-trae .p-label{color:#34d399}
#p-jimeng{--cg:rgba(251,146,60,.2);--cb:rgba(251,146,60,.18);--cs:rgba(251,146,60,.04);border-color:rgba(251,146,60,.06)}
#p-jimeng .p-label{color:#fb923c}

.copy-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border:1px solid rgba(255,255,255,.08);
  border-radius:7px;background:rgba(255,255,255,.03);color:var(--text3);font-size:10px;font-family:'Inter',sans-serif;
  cursor:pointer;transition:all .25s;flex-shrink:0}
.copy-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.copy-btn.copied{border-color:#34d399;color:#34d399;background:rgba(52,211,153,.08)}
.copy-btn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* 3D 预览区 */
#preview{flex:1;position:relative;background:radial-gradient(ellipse at 50% 50%,rgba(15,15,22,1),rgba(6,6,8,1));min-height:220px;overflow:hidden}
#preview canvas{display:block;width:100%!important;height:100%!important}
#preview-label{position:absolute;bottom:12px;left:12px;z-index:2;font-size:10px;color:var(--text3);
  background:rgba(0,0,0,.5);backdrop-filter:blur(8px);padding:5px 12px;border-radius:7px;
  border:1px solid rgba(255,255,255,.04);pointer-events:none;letter-spacing:.5px}

@media(max-width:1100px){#prompt-panel{width:260px;min-width:260px}}
@media(max-width:900px){
  #app{flex-wrap:wrap}
  #sidebar{width:100%;min-width:0;max-height:150px;border-right:none;border-bottom:1px solid var(--border)}
  #sidebar::after{display:none}
  #nav-list{display:flex;overflow-x:auto;overflow-y:hidden;padding:6px;gap:4px}
  .nav-item{white-space:nowrap;flex-shrink:0}.nav-item::before{display:none}
  #detail{flex:1 1 50%;min-width:260px}
  #prompt-panel{flex:1 1 50%;min-width:260px;width:auto}
  #info-panel{max-height:32%;padding:14px}#info-title{font-size:20px}
}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>3D Visual Assets</h1>
      <p>Vol.2 · 光学与物理篇</p>
    </div>
    <ul id="nav-list"></ul>
  </aside>
  <main id="detail">
    <div id="info-panel">
      <div id="info-title">选择一个特效</div>
      <div id="info-subtitle">从左侧列表中点击查看详情</div>
      <div id="info-desc"></div>
      <div id="info-params" class="info-section" style="display:none"><h3>核心参数 / 算法</h3><div class="tag-list" id="param-tags"></div></div>
      <div id="info-tech" class="info-section" style="display:none"><h3>前端落地技术</h3><div class="tag-list" id="tech-tags"></div></div>
    </div>
    <div id="preview">
      <div id="preview-label">拖拽旋转 · 滚轮缩放</div>
    </div>
  </main>
  <aside id="prompt-panel">
    <div id="prompt-header"><h2>Prompt 提示词</h2></div>
    <div id="prompt-cards">
      <div id="p-mj" class="prompt-card" style="display:none"></div>
      <div id="p-trae" class="prompt-card" style="display:none"></div>
      <div id="p-jimeng" class="prompt-card" style="display:none"></div>
    </div>
  </aside>
</div>

const COPY_SVG = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
const CHECK_SVG = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;

function renderPrompt(elId, label, text) {
  const el = document.getElementById(elId);
  el.style.display = 'block';
  el.innerHTML = `<div class="p-header"><div class="p-label">${label}</div>
    <button class="copy-btn" data-p="${text.replace(/"/g,'&quot;')}">${COPY_SVG}<span>复制</span></button></div>
    <div class="p-text">${text}</div>`;
  el.querySelector('.copy-btn').addEventListener('click', doCopy);
}
function doCopy(e) {
  const btn = e.currentTarget; const t = btn.dataset.p;
  const fallback = () => { const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta); };
  const done = () => { btn.classList.add('copied');btn.innerHTML=`${CHECK_SVG}<span>已复制</span>`;setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML=`${COPY_SVG}<span>复制</span>`;},2000); };
  navigator.clipboard ? navigator.clipboard.writeText(t).then(done).catch(()=>{fallback();done();}) : (fallback(), done());
}

let sceneObjects = [];
function clearScene() {
  sceneObjects.forEach(obj => {
    scene.remove(obj);
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (obj.material.map) obj.material.map.dispose();
      if (obj.material.displacementMap) obj.material.displacementMap.dispose();
      obj.material.dispose();
    }
  });
  sceneObjects = [];
}

// --- 1. Glassmorphism ---
function buildGlass() {
  camera.position.set(0, 0, 5);
  // 背景彩色球
  const colors = [0xff4466, 0x44ff88, 0x4488ff, 0xffaa22, 0xcc44ff];
  colors.forEach((c, i) => {
    const m = new THREE.Mesh(new THREE.SphereGeometry(0.35, 32, 32),
      new THREE.MeshStandardMaterial({ color: c, emissive: c, emissiveIntensity: 0.3 }));
    m.position.set(Math.sin(i*1.3)*1.5, Math.cos(i*1.7)*1, -1.5 + Math.sin(i)*0.5);
    scene.add(m); sceneObjects.push(m);
  });
  // 毛玻璃面板
  const glass = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 2.5, 1, 1),
    new THREE.MeshPhysicalMaterial({
      color: 0xffffff, transmission: 1, roughness: 0.18, thickness: 0.5,

    }));

  scene.add(glass); sceneObjects.push(glass);
}

// --- 2. Caustics ---
function buildCaustics() {
  camera.position.set(0, 3, 4);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader: `
      uniform float uTime;varying vec2 vUv;
      float caustic(vec2 p,float t){
        float v=0.;for(int i=0;i<3;i++){
          float fi=float(i);
          vec2 q=p*(.8+fi*.3);
          q+=vec2(sin(t*.3+fi*.7),cos(t*.4+fi*.5))*.5;
          float s=sin(q.x*6.+t+fi)*cos(q.y*6.+t*1.1+fi);
          v+=abs(s);
        }return v/3.;
      }
      void main(){
        vec2 p=vUv*2.-1.;
        float c=caustic(p,uTime);
        c=pow(c,1.5)*1.2;
        vec3 col=mix(vec3(.0,.02,.06),vec3(.1,.5,.9),c)+vec3(.1,.8,.6)*pow(c,3.);
        gl_FragColor=vec4(col,1.);
      }`
  });
  const plane = new THREE.Mesh(new THREE.PlaneGeometry(6, 6), mat);
  plane.rotation.x = -Math.PI / 2;
  scene.add(plane); sceneObjects.push(plane);
  // 水面
  const water = new THREE.Mesh(new THREE.PlaneGeometry(6, 6),
    new THREE.MeshPhysicalMaterial({ color: 0x0088cc, transmission: 0.8, roughness: 0.1, thickness: 0.3, side: THREE.DoubleSide, opacity: 0.4, transparent: true }));
  water.rotation.x = -Math.PI / 2; water.position.y = 1.8;
  scene.add(water); sceneObjects.push(water);
}

// --- 3. Chromatic Aberration ---
function buildChromatic() {
  camera.position.set(0, 0, 4);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec3 vNorm;varying vec3 vPos;varying vec2 vUv;
      void main(){vNorm=normalize(normalMatrix*normal);vPos=(modelViewMatrix*vec4(position,1.)).xyz;vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader: `
      uniform float uTime;varying vec3 vNorm;varying vec3 vPos;varying vec2 vUv;
      void main(){
        vec3 viewDir=normalize(-vPos);
        float fresnel=1.-abs(dot(viewDir,vNorm));
        float offset=fresnel*0.06+sin(uTime*2.)*.01;
        float r=smoothstep(.3,.7,fract(vUv.x*8.+offset*10.));
        float g=smoothstep(.3,.7,fract(vUv.x*8.));
        float b=smoothstep(.3,.7,fract(vUv.x*8.-offset*10.));
        vec3 base=vec3(.15,.15,.2)+vec3(r*.3,g*.1,b*.4)*fresnel;
        base+=vec3(1.,.3,.3)*pow(fresnel,3.)*offset*8.;
        base+=vec3(.3,.3,1.)*pow(fresnel,3.)*offset*8.;
        gl_FragColor=vec4(base+vec3(.05),1.);
      }`
  });
  const mesh = new THREE.Mesh(new THREE.TorusKnotGeometry(1, 0.35, 128, 32), mat);
  scene.add(mesh); sceneObjects.push(mesh);
}

// --- 4. Voronoi ---
function buildVoronoi() {
  camera.position.set(0, 0, 4);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv;varying vec3 vNorm;varying vec3 vPos;
      void main(){vUv=uv;vNorm=normalize(normalMatrix*normal);vPos=(modelViewMatrix*vec4(position,1.)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader: `
      uniform float uTime;varying vec2 vUv;varying vec3 vNorm;varying vec3 vPos;
      vec2 hash(vec2 p){return fract(sin(vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))))*43758.5453);}
      void main(){
        vec2 uv=vUv*6.;
        vec2 ip=floor(uv),fp=fract(uv);
        float md=2.;float md2=2.;
        for(int x=-1;x<=1;x++)for(int y=-1;y<=1;y++){
          vec2 n=vec2(float(x),float(y));
          vec2 p=hash(ip+n)+sin(uTime*.4+hash(ip+n)*6.28)*.3;
          float d=length(n+p-fp);
          if(d<md){md2=md;md=d;}else if(d<md2){md2=d;}
        }
        float edge=1.-smoothstep(.0,.06,md2-md);
        float fresnel=1.-abs(dot(normalize(-vPos),vNorm));
        vec3 cellCol=vec3(.04,.04,.06)+vec3(.0,.02,.04)*md*2.;
        vec3 edgeCol=mix(vec3(.0,.6,1.),vec3(.5,.2,1.),fresnel)*1.5;
        vec3 col=mix(cellCol,edgeCol,edge);
        col+=vec3(.0,.4,.8)*pow(fresnel,3.)*.4;
        gl_FragColor=vec4(col,1.);
      }`
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(1.5, 64, 64), mat);
  scene.add(mesh); sceneObjects.push(mesh);
}

// --- 5. Soft Body / Cloth ---
function buildSoftBody() {
  camera.position.set(0, 2, 4);

// --- 6. Volumetric Lighting ---
function buildVolumetric() {
  camera.position.set(0, 1, 5);
  // 地面
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(8, 8),
    new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 }));
  floor.rotation.x = -Math.PI / 2; floor.position.y = -1.5;
  scene.add(floor); sceneObjects.push(floor);
  // 光柱
  const beamCount = 5;
  for (let i = 0; i < beamCount; i++) {
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(0.4 + Math.random() * 0.3, 4, 32, 1, true),
      new THREE.ShaderMaterial({
        transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
        uniforms: { uColor: { value: new THREE.Color().setHSL(0.12 + i * 0.02, 0.8, 0.6) } },
        vertexShader: `varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
        fragmentShader: `uniform vec3 uColor;varying vec2 vUv;void main(){
          float a=smoothstep(0.,.3,vUv.y)*smoothstep(1.,.5,vUv.y);
          a*=smoothstep(0.,.4,1.-abs(vUv.x-.5)*2.);a*=.35;
          gl_FragColor=vec4(uColor,a);}`
      })
    );
    cone.position.set(-2 + i * 1, 0.5, -1 + Math.sin(i) * 0.5);
    cone.rotation.z = (Math.random() - 0.5) * 0.15;
    scene.add(cone); sceneObjects.push(cone);
  }
  // 尘埃粒子
  const dustGeo = new THREE.BufferGeometry();
  const dustCount = 300;
  const dPos = new Float32Array(dustCount * 3);
  for (let i = 0; i < dustCount; i++) {
    dPos[i*3] = (Math.random()-0.5)*6; dPos[i*3+1] = Math.random()*3-1; dPos[i*3+2] = (Math.random()-0.5)*4;
  }
  dustGeo.setAttribute('position', new THREE.BufferAttribute(dPos, 3));
  const dustMat = new THREE.PointsMaterial({ size: 0.02, color: 0xffcc66, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, depthWrite: false });
  const dust = new THREE.Points(dustGeo, dustMat);
  dust.userData.isDust = true;
  scene.add(dust); sceneObjects.push(dust);
}

// --- 7. Parallax Mapping ---
function buildParallax() {
  camera.position.set(0, 1.5, 3);
  // 程序化高度图
  const sz = 256;
  const c = document.createElement('canvas'); c.width = c.height = sz;
  const ctx = c.getContext('2d');
  for (let y = 0; y < sz; y++) for (let x = 0; x < sz; x++) {
    const cx = x / sz - 0.5, cy = y / sz - 0.5;
    const d = Math.sqrt(cx*cx + cy*cy);
    const v = Math.sin(d * 30) * 0.5 + 0.5;
    const v2 = Math.sin(x * 0.15) * Math.cos(y * 0.15) * 0.3 + 0.5;
    const val = Math.floor((v * 0.6 + v2 * 0.4) * 255);
    ctx.fillStyle = `rgb(${val},${val},${val})`;
    ctx.fillRect(x, y, 1, 1);
  }
  const dispMap = new THREE.CanvasTexture(c);
  const geo = new THREE.PlaneGeometry(3, 3, 200, 200);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xaaaacc, roughness: 0.5, metalness: 0.3,
    displacementMap: dispMap, displacementScale: 0.7, displacementBias: -0.35,
    side: THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI * 0.35;
  scene.add(mesh); sceneObjects.push(mesh);
}

// --- 8. Particle Morphing ---
function buildParticle() {
  camera.position.set(0, 0, 5);
  const srcGeo = new THREE.TorusKnotGeometry(1, 0.35, 200, 32);
  const srcPos = srcGeo.attributes.position.array;
  const count = srcPos.length / 3;
  const startPos = new Float32Array(count * 3);
  const targetPos = new Float32Array(srcPos);
  for (let i = 0; i < count; i++) {
    startPos[i*3] = (Math.random()-0.5)*6;
    startPos[i*3+1] = (Math.random()-0.5)*6;
    startPos[i*3+2] = (Math.random()-0.5)*6;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(count*3), 3));
  geo.userData = { startPos, targetPos, count };
  const mat = new THREE.PointsMaterial({
    size: 0.025, color: 0x00d4ff, transparent: true, opacity: 0.8,
    blending: THREE.AdditiveBlending, depthWrite: false
  });
  const points = new THREE.Points(geo, mat);
  points.userData.isParticle = true;
  scene.add(points); sceneObjects.push(points);
  srcGeo.dispose();
}

// --- 9. Ambient Occlusion ---
function buildAO() {
  camera.position.set(3, 3, 4);
  const mat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.85, metalness: 0.0 });
  // 堆叠的立方体
  for (let x = 0; x < 4; x++) for (let y = 0; y < 3; y++) for (let z = 0; z < 4; z++) {
    if (Math.random() < 0.35) continue;
    const s = 0.4 + Math.random() * 0.2;
    const box = new THREE.Mesh(new THREE.BoxGeometry(s, s, s), mat);
    box.position.set(x * 0.55 - 0.8, y * 0.55, z * 0.55 - 0.8);
    box.castShadow = true; box.receiveShadow = true;
    scene.add(box); sceneObjects.push(box);
  }
  // 底板
  const base = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 4), mat);
  base.position.y = -0.15;
  scene.add(base); sceneObjects.push(base);
}

// --- 10. Glitch ---
function buildGlitch() {
  camera.position.set(0, 0, 4);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv;varying vec3 vN;varying vec3 vP;
      void main(){vUv=uv;vN=normalize(normalMatrix*normal);vP=(modelViewMatrix*vec4(position,1.)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader: `
      uniform float uTime;varying vec2 vUv;varying vec3 vN;varying vec3 vP;
      float rand(float n){return fract(sin(n)*43758.5453);}
      void main(){
        vec2 uv=vUv;
        // 水平撕裂
        float line=floor(uv.y*40.);
        float glitchTrigger=step(.92,rand(line+floor(uTime*8.)));
        uv.x+=glitchTrigger*(rand(line+uTime)-.5)*.3;
        // 扫描线
        float scan=sin(uv.y*300.+uTime*10.)*.5+.5;
        scan=mix(1.,.85,scan);
        // RGB split
        float off=.015+glitchTrigger*.04;
        float fresnel=1.-abs(dot(normalize(-vP),vN));
        vec3 col;
        col.r=smoothstep(.4,.6,fract((uv.x+off)*5.))*0.8+.2;
        col.g=smoothstep(.4,.6,fract(uv.x*5.))*0.6+.2;
        col.b=smoothstep(.4,.6,fract((uv.x-off)*5.))*0.9+.2;
        col*=scan;
        col+=vec3(.0,.3,.5)*pow(fresnel,2.)*.5;
        col=mix(col,vec3(rand(uv.y+uTime)),glitchTrigger*.4);
        gl_FragColor=vec4(col,1.);
      }`
  });
  const mesh = new THREE.Mesh(new THREE.TorusKnotGeometry(1, 0.35, 128, 32), mat);
  scene.add(mesh); sceneObjects.push(mesh);
}

// --- 11. Liquid Glass (液态玻璃) ---
function buildLiquidGlass() {
  camera.position.set(0, 0, 4);
  // 高细分球体作为液态玻璃体
  const geo = new THREE.IcosahedronGeometry(1.3, 5);
  const mat = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    transmission: 1,
    roughness: 0.02,
    ior: 2.4,
    thickness: 3.0,
    envMapIntensity: 1.2,
    specularIntensity: 1.0,
    specularColor: new THREE.Color(0xffffff),
    attenuationColor: new THREE.Color(0xccddff),
    attenuationDistance: 2.5,
    dispersion: 0.8,
    clearcoat: 0.3,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData.isLiquidMorph = true;
  mesh.userData.origPositions = Float32Array.from(geo.attributes.position.array);
  scene.add(mesh); sceneObjects.push(mesh);
  // 背景彩色小球增强折射效果
  const bgColors = [0xff3366, 0x33ff99, 0x3366ff, 0xffcc00, 0xff66cc];
  bgColors.forEach((c, i) => {
    const s = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16),
      new THREE.MeshStandardMaterial({ color: c, emissive: c, emissiveIntensity: 0.5 }));
    const angle = (i / bgColors.length) * Math.PI * 2;
    s.position.set(Math.cos(angle)*2.5, Math.sin(angle)*2.5, -2);
    scene.add(s); sceneObjects.push(s);
  });
}

// --- 12. Liquid Metal (液态金属) ---
function buildLiquidMetal() {
  camera.position.set(0, 0, 4);
  const geo = new THREE.IcosahedronGeometry(1.2, 6);
  const mat = new THREE.MeshPhysicalMaterial({
    color: 0xcccccc,
    metalness: 1.0,
    roughness: 0.0,
    envMapIntensity: 2.5,
    clearcoat: 0.8,
    clearcoatRoughness: 0.05,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData.isLiquidMorph = true;
  mesh.userData.origPositions = Float32Array.from(geo.attributes.position.array);
  scene.add(mesh); sceneObjects.push(mesh);
}

const builders = {
  glass: buildGlass, caustics: buildCaustics, chromatic: buildChromatic,
  voronoi: buildVoronoi, softbody: buildSoftBody, volumetric: buildVolumetric,
  parallax: buildParallax, particle: buildParticle, ao: buildAO, glitch: buildGlitch,
  liquidglass: buildLiquidGlass, liquidmetal: buildLiquidMetal
};

/* ============================================================
   七、选中逻辑
   ============================================================ */
let currentIdx = -1;

function selectItem(idx) {
  if (idx === currentIdx) return;
  currentIdx = idx;
  const item = DATA[idx];

  document.querySelectorAll('.nav-item').forEach((el, i) => el.classList.toggle('active', i === idx));

  document.getElementById('info-title').textContent = item.en;
  document.getElementById('info-subtitle').textContent = item.zh;
  document.getElementById('info-desc').textContent = item.desc;
  document.getElementById('param-tags').innerHTML = item.params.map(p => `<span class="tag param">${p}</span>`).join('');
  document.getElementById('info-params').style.display = 'block';
  document.getElementById('tech-tags').innerHTML = item.tech.map(t => `<span class="tag tech">${t}</span>`).join('');
  document.getElementById('info-tech').style.display = 'block';

  renderPrompt('p-mj', '🎨 Midjourney', item.mj);
  renderPrompt('p-trae', '🤖 Trae', item.trae);
  renderPrompt('p-jimeng', '🎬 即梦生视频', item.jimeng);

  // 切换 3D 场景
  clearScene();
  camera.position.set(0, 0, 5);
  controls.target.set(0, 0, 0);
  const builder = builders[item.id];
  if (builder) builder();
  controls.update();
}

/* ============================================================
   八、动画循环
   ============================================================ */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();

  sceneObjects.forEach(obj => {
    // Shader 时间更新
    if (obj.material && obj.material.uniforms && obj.material.uniforms.uTime) {
      obj.material.uniforms.uTime.value = t;
    }
    // 布料波浪
    if (obj.userData.isCloth) {
      const pos = obj.geometry.attributes.position;
      const orig = obj.userData.origPositions;
      for (let i = 0; i < pos.count; i++) {
        const ox = orig[i*3], oy = orig[i*3+1];
        pos.array[i*3+2] = Math.sin(ox * 2 + t * 1.5) * Math.cos(oy * 2 + t * 1.2) * 0.25
          + Math.sin(ox * 4 + t * 0.8) * 0.08;
      }
      pos.needsUpdate = true;
      obj.geometry.computeVertexNormals();
    }
    // 粒子变形
    if (obj.userData.isParticle) {
      const geo = obj.geometry;
      const { startPos, targetPos, count } = geo.userData;
      const pos = geo.attributes.position.array;
      const progress = (Math.sin(t * 0.5) * 0.5 + 0.5); // 0~1 循环
      for (let i = 0; i < count * 3; i++) {
        pos[i] = startPos[i] + (targetPos[i] - startPos[i]) * progress;
      }
      geo.attributes.position.needsUpdate = true;
    }
    // 液态变形 (液态玻璃 + 液态金属)
    if (obj.userData.isLiquidMorph) {
      const pos = obj.geometry.attributes.position;
      const orig = obj.userData.origPositions;
      for (let i = 0; i < pos.count; i++) {
        const ox = orig[i*3], oy = orig[i*3+1], oz = orig[i*3+2];
        const len = Math.sqrt(ox*ox + oy*oy + oz*oz);
        const nx = ox/len, ny = oy/len, nz = oz/len;
        // 多层噪波叠加
        const n1 = Math.sin(nx*3.+t*0.8)*Math.cos(ny*4.+t*0.6)*Math.sin(nz*3.5+t*0.7)*0.12;
        const n2 = Math.sin(nx*7.+t*1.3)*Math.cos(nz*5.+t*1.1)*0.05;
        const n3 = Math.sin(ny*9.+t*2.0)*0.02;
        const disp = n1 + n2 + n3;
        pos.array[i*3]   = ox + nx * disp;
        pos.array[i*3+1] = oy + ny * disp;
        pos.array[i*3+2] = oz + nz * disp;
      }
      pos.needsUpdate = true;
      obj.geometry.computeVertexNormals();
    }
    // 尘埃漂浮
    if (obj.userData.isDust) {
      const pos = obj.geometry.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        pos.array[i*3+1] += 0.002;
        if (pos.array[i*3+1] > 2) pos.array[i*3+1] = -1;
      }
      pos.needsUpdate = true;
    }
  });

  // 默认旋转（非布料、非粒子场景的主物体）
  if (sceneObjects.length > 0) {
    const main = sceneObjects[sceneObjects.length - 1];
    if (!main.userData.isCloth && !main.userData.isParticle && !main.userData.isDust && main.isMesh) {
      main.rotation.y = t * 0.15;
    }
  }

  renderer.render(scene, camera);
}
animate();

/* ============================================================
   九、窗口自适应
   ============================================================ */
const ro = new ResizeObserver(() => {
  const w = container.clientWidth, h = container.clientHeight;
  if (w > 0 && h > 0) {
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }
});
ro.observe(container);

/* ============================================================
   十、自动选中第一个
   ============================================================ */
selectItem(0);

</script>
</body>
